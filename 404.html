<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena – Crystal Valley</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:'Jost',sans-serif; background:#f5f0e8; color:#3b2a1a; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }

  img { width: 120px; margin-bottom: 2rem; opacity: 0.85; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:6rem; font-weight:300; line-height:1; margin-bottom:0.5rem; color:#c9a84c; }
  h2 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; margin-bottom:1rem; }
  p { font-size:0.9rem; color:#6b4c2a; font-weight:300; margin-bottom:2rem; }
  a { display:inline-block; padding:0.85rem 2rem; background:#3b2a1a; color:#f5f0e8; text-decoration:none; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; border-radius:3px; }
  a:hover { background:#6b4c2a; }
</style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="Crystal Valley">
    <h1>404</h1>
    <h2>Stránka nenalezena</h2>
    <p>Tato stránka neexistuje nebo byla přesunuta.<br>Vraťte se zpět na hlavní stránku.</p>

</html>
