<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Crystal Valley</title>
<style>
:root {
  --cream: #f5f0e8; --cream-dark: #ede6d6; --brown: #3b2a1a; --brown-mid: #6b4c2a;
  --gold: #c9a84c; --gold-light: #e8d09a; --green: #2d6a4f; --red: #8b2e2e;
  --white: #fefcf8; --border: rgba(201,168,76,0.3); --shadow: rgba(59,42,26,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--brown); min-height:100vh; }

/* LOGIN */
#login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(ellipse at 50% 0%, #e8dcc8, var(--cream)); }
.login-box { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:3rem 2.5rem; width:380px; box-shadow:0 16px 48px var(--shadow); text-align:center; }
.login-box img { width:90px; margin-bottom:1.5rem; }
.login-box h2 { font-size:1.4rem; font-weight:400; margin-bottom:0.25rem; }
.login-box p { font-size:0.82rem; color:var(--brown-mid); margin-bottom:2rem; }

/* INPUTS */
.field { margin-bottom:1rem; text-align:left; }
.field label { display:block; font-size:0.75rem; font-weight:600; color:var(--brown-mid); margin-bottom:0.35rem; letter-spacing:0.05em; text-transform:uppercase; }
.field input, .field textarea, .field select { width:100%; padding:0.7rem 0.9rem; border:1.5px solid var(--border); border-radius:8px; font-size:0.88rem; background:var(--cream); color:var(--brown); font-family:inherit; transition:border-color 0.2s; }
.field input:focus, .field textarea:focus, .field select:focus { outline:none; border-color:var(--gold); }
.field textarea { resize:vertical; min-height:80px; }
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }

/* BUTTONS */
.btn { padding:0.65rem 1.4rem; border-radius:8px; font-size:0.82rem; cursor:pointer; border:none; font-weight:600; transition:all 0.2s; display:inline-flex; align-items:center; gap:0.4rem; }
.btn-primary { background:var(--brown); color:var(--cream); }
.btn-primary:hover { background:var(--brown-mid); transform:translateY(-1px); }
.btn-success { background:var(--green); color:white; }
.btn-success:hover { opacity:0.9; transform:translateY(-1px); }
.btn-danger { background:var(--red); color:white; }
.btn-danger:hover { opacity:0.9; }
.btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--brown-mid); }
.btn-outline:hover { border-color:var(--gold); color:var(--brown); }
.btn-gold { background:var(--gold); color:var(--brown); }
.btn-gold:hover { background:var(--gold-light); }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }

/* ADMIN LAYOUT */
#admin-screen { display:none; }
.admin-header { background:var(--brown); color:var(--cream); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; }
.admin-header h2 { font-size:1rem; font-weight:500; display:flex; align-items:center; gap:0.75rem; }
.admin-header h2 img { height:32px; }

.tabs { display:flex; background:var(--white); padding:0 1.5rem; border-bottom:1px solid var(--border); overflow-x:auto; gap:0; }
.tab { padding:1rem 1.25rem; font-size:0.82rem; cursor:pointer; background:none; border:none; border-bottom:2px solid transparent; color:var(--brown-mid); white-space:nowrap; transition:all 0.2s; }
.tab.active { border-bottom-color:var(--gold); color:var(--brown); font-weight:600; }
.tab:hover:not(.active) { color:var(--brown); }

.panel { display:none; padding:2rem; max-width:920px; margin:0 auto; }
.panel.active { display:block; }

.card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:1.75rem; margin-bottom:1.5rem; box-shadow:0 2px 12px var(--shadow); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
.card-header h3 { font-size:1.05rem; font-weight:600; }

/* ITEM LIST */
.item-row { display:flex; align-items:center; gap:1rem; padding:0.9rem 1rem; background:var(--cream); border-radius:8px; border:1px solid var(--border); margin-bottom:0.5rem; transition:box-shadow 0.2s; }
.item-row:hover { box-shadow:0 4px 12px var(--shadow); }
.item-row.dragging { opacity:0.4; }
.item-row.drag-over { box-shadow:0 0 0 2px var(--gold) inset; }
.item-row img { width:52px; height:52px; object-fit:cover; border-radius:6px; flex-shrink:0; background:var(--cream-dark); }
.item-row-info { flex:1; min-width:0; }
.item-row-info strong { display:block; font-size:0.92rem; }
.item-row-info span { font-size:0.78rem; color:var(--brown-mid); }
.item-actions { display:flex; gap:0.4rem; flex-shrink:0; align-items:center; }
.drag-handle { cursor:grab; font-size:1.1rem; color:var(--brown-mid); flex-shrink:0; user-select:none; padding:0 0.2rem; touch-action:none; }
.drag-handle:active { cursor:grabbing; }
.btn-move { background:transparent; border:1px solid var(--border); color:var(--brown-mid); width:28px; height:28px; padding:0; border-radius:6px; cursor:pointer; font-size:0.85rem; display:inline-flex; align-items:center; justify-content:center; }
.btn-move:hover:not(:disabled) { border-color:var(--gold); color:var(--brown); }
.btn-move:disabled { opacity:0.35; cursor:not-allowed; }

/* UPLOAD AREAS */
.upload-area { border:2px dashed var(--border); border-radius:10px; padding:1.5rem; text-align:center; cursor:pointer; color:var(--brown-mid); font-size:0.85rem; transition:all 0.2s; background:var(--cream); }
.upload-area:hover { border-color:var(--gold); color:var(--brown); background:rgba(201,168,76,0.04); }
.upload-area input[type=file] { display:none; }
.upload-area .upload-icon { font-size:2rem; display:block; margin-bottom:0.5rem; }
.upload-preview-wrap { margin-top:0.75rem; }
.upload-preview-main { width:100%; max-height:400px; object-fit:contain; border-radius:6px; display:none; border:1px solid var(--border); }

/* SUBGALLERY */
.subgallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(90px,1fr)); gap:0.6rem; margin-top:0.75rem; }
.subgallery-thumb { position:relative; aspect-ratio:1; border-radius:6px; overflow:hidden; border:1.5px solid var(--border); cursor:grab; }
.subgallery-thumb img { width:100%; height:100%; object-fit:cover; }
.subgallery-thumb .thumb-del { position:absolute; top:3px; right:3px; background:rgba(139,46,46,0.9); color:white; border:none; width:20px; height:20px; border-radius:50%; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
.subgallery-thumb .thumb-num { position:absolute; bottom:3px; left:3px; background:rgba(0,0,0,0.6); color:white; font-size:10px; padding:1px 5px; border-radius:3px; }
.subgallery-upload-progress { background:rgba(201,168,76,0.1); border:1px solid var(--border); border-radius:6px; padding:0.75rem; margin-top:0.5rem; font-size:0.8rem; color:var(--brown-mid); display:none; }
.progress-bar { height:4px; background:var(--cream-dark); border-radius:2px; margin-top:0.4rem; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); border-radius:2px; transition:width 0.3s; }

/* KITTEN ROWS */
.kitten-row { background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:0.75rem; margin-bottom:0.5rem; display:grid; grid-template-columns:auto 2fr 1.5fr 1fr 1.2fr auto; gap:0.5rem; align-items:center; }
.kitten-row.dragging { opacity:0.4; }
.kitten-row.drag-over { box-shadow:0 0 0 2px var(--gold) inset; }
.kitten-row input, .kitten-row select { margin:0; padding:0.5rem 0.6rem; border:1px solid var(--border); border-radius:6px; font-size:0.82rem; background:white; width:100%; }
.kitten-row-pedigree { grid-column:1/-1; display:flex; gap:0.5rem; align-items:center; }
.kitten-row-pedigree input { flex:1; margin:0; padding:0.5rem 0.6rem; border:1px solid var(--border); border-radius:6px; font-size:0.82rem; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(20,10,0,0.55); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; z-index:500; padding:1rem; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--white); border-radius:16px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,0.25); }
.modal-header { display:flex; justify-content:space-between; align-items:center; padding:1.5rem 2rem; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--white); z-index:10; border-radius:16px 16px 0 0; }
.modal-header h3 { font-size:1.1rem; font-weight:600; }
.modal-close { background:var(--cream); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
.modal-body { padding:1.5rem 2rem; }
.modal-footer { padding:1.25rem 2rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; justify-content:flex-end; position:sticky; bottom:0; background:var(--white); border-radius:0 0 16px 16px; }

/* GALLERY GRID */
.gallery-admin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:0.75rem; margin-top:1rem; }
.gallery-admin-item { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.gallery-admin-item img { width:100%; height:100%; object-fit:cover; }
.gallery-admin-item button { position:absolute; top:4px; right:4px; background:rgba(139,46,46,0.9); color:white; border:none; width:22px; height:22px; border-radius:50%; cursor:pointer; font-size:12px; }
.gallery-admin-item .g-label { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.6); color:white; font-size:0.65rem; padding:3px 6px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* TOAST */
.toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:0.85rem 1.5rem; border-radius:10px; font-size:0.88rem; font-weight:500; display:none; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,0.2); animation:slideUp 0.3s ease; }
.toast.success { background:var(--green); color:white; }
.toast.error { background:var(--red); color:white; }
.toast.info { background:var(--brown); color:var(--cream); }
@keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

/* SPINNER */
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* LOADING */
.loading-state { text-align:center; padding:3rem; color:var(--brown-mid); }

@media (max-width:600px) {
  .panel { padding:1rem; }
  .modal-body, .modal-header, .modal-footer { padding:1rem 1.25rem; }
  .kitten-row { grid-template-columns:auto 1fr 1fr; }
  .field-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="logo.png" alt="Crystal Valley" onerror="this.style.display='none'">
    <h2>Crystal Valley</h2>
    <p>Správa webu — přihlašte se</p>
    <div class="field"><label>Uživatelské jméno</label><input type="text" id="login-user" placeholder="admin" autocomplete="username"></div>
    <div class="field"><label>Heslo</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;margin-top:0.5rem">Přihlásit se</button>
    <p id="login-error" style="color:var(--red);font-size:0.8rem;margin-top:0.75rem;display:none">❌ Špatné přihlašovací údaje</p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-header">
    <h2><img src="logo.png" alt="" onerror="this.style.display='none'"> Crystal Valley Admin</h2>
    <button class="btn btn-outline" style="color:white;border-color:rgba(255,255,255,0.3)" onclick="logout()">Odhlásit</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('cats',this)">🐱 Kočky</button>
    <button class="tab" onclick="showTab('toms',this)">🐈 Kocouři</button>
    <button class="tab" onclick="showTab('litters',this)">🐾 Koťata</button>
    <button class="tab" onclick="showTab('gallery',this)">📸 Galerie</button>
    <button class="tab" onclick="showTab('about',this)">📝 O nás</button>
    <button class="tab" onclick="showTab('settings',this)">⚙️ Nastavení</button>
  </div>

  <div class="panel active" id="panel-cats">
    <div class="card">
      <div class="card-header"><h3>Chovné kočky</h3><button class="btn btn-primary" onclick="openModal('cats')">+ Přidat kočku</button></div>
      <div id="list-cats"><div class="loading-state">Načítám...</div></div>
    </div>
  </div>

  <div class="panel" id="panel-toms">
    <div class="card">
      <div class="card-header"><h3>Chovní kocouři</h3><button class="btn btn-primary" onclick="openModal('toms')">+ Přidat kocoura</button></div>
      <div id="list-toms"><div class="loading-state">Načítám...</div></div>
    </div>
  </div>

  <div class="panel" id="panel-litters">
    <div class="card">
      <div class="card-header"><h3>Vrhy</h3><button class="btn btn-primary" onclick="openModal('litter')">+ Přidat vrh</button></div>
      <div id="list-litters"><div class="loading-state">Načítám...</div></div>
    </div>
  </div>

  <div class="panel" id="panel-gallery">
    <div class="card">
      <div class="card-header"><h3>Galerie</h3><button class="btn btn-primary" onclick="openModal('gallery')">+ Přidat foto</button></div>
      <div class="gallery-admin-grid" id="gallery-grid"></div>
    </div>
  </div>

  <div class="panel" id="panel-about">
    <div class="card">
      <h3 style="margin-bottom:1rem">Text sekce „O nás"</h3>
      <div class="field"><label>Text</label><textarea id="about-text" rows="10" placeholder="Napište text o vaší chovatelské stanici..."></textarea></div>
      <button class="btn btn-success" id="about-save-btn" onclick="saveAbout()">💾 Uložit text</button>
    </div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="card">
      <h3 style="margin-bottom:1.5rem">Změna přihlašovacích údajů</h3>
      <div class="field"><label>Nové uživatelské jméno</label><input type="text" id="new-user" placeholder="admin"></div>
      <div class="field"><label>Nové heslo</label><input type="password" id="new-pass" placeholder="••••••••"></div>
      <div class="field"><label>Potvrdit nové heslo</label><input type="password" id="new-pass2" placeholder="••••••••"></div>
      <button class="btn btn-success" onclick="changeCredentials()">Uložit změny</button>
      <p id="settings-msg" style="font-size:0.82rem;margin-top:0.75rem;display:none"></p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Formulář</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Zrušit</button>
      <button class="btn btn-success" id="modal-save-btn" onclick="saveModal()">💾 Uložit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
// ── CONFIG ──
const API_URL = '/api/save';
const GH_OWNER = 'PetrBroz-ofc';
const GH_REPO  = 'crystalvalley-web';
const DEFAULT_USER = 'admin';
const DEFAULT_PASS = 'crystalvalley2024';

let DATA = { cats:[], toms:[], litters:[], gallery:[], about:{} };
let fileSHAs = {};
let currentModal = null;
let editIndex = -1;
let currentModalSubgallery = [];

// ── AUTH ──
function init() {
  if (!localStorage.getItem('cv_user')) localStorage.setItem('cv_user', DEFAULT_USER);
  if (!localStorage.getItem('cv_pass')) localStorage.setItem('cv_pass', DEFAULT_PASS);
  show('login-screen');
}

function login() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (user === localStorage.getItem('cv_user') && pass === localStorage.getItem('cv_pass')) {
    err.style.display = 'none';
    show('admin-screen');
    loadData();
  } else {
    err.style.display = 'block';
  }
}

function logout() { show('login-screen'); document.getElementById('login-pass').value = ''; }

function changeCredentials() {
  const user = document.getElementById('new-user').value.trim();
  const pass = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const msg = document.getElementById('settings-msg');
  if (!user || !pass) { showMsg(msg, '❌ Vyplňte všechna pole.', false); return; }
  if (pass !== pass2) { showMsg(msg, '❌ Hesla se neshodují.', false); return; }
  localStorage.setItem('cv_user', user);
  localStorage.setItem('cv_pass', pass);
  showMsg(msg, '✅ Přihlašovací údaje uloženy.', true);
  ['new-user','new-pass','new-pass2'].forEach(id => document.getElementById(id).value = '');
}

function showMsg(el, text, ok) {
  el.style.display = 'block';
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  el.textContent = text;
}

function show(id) {
  ['login-screen','admin-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = s === id ? (id === 'admin-screen' ? 'block' : 'flex') : 'none';
  });
}

// ── GITHUB API ──
async function ghGet(path) {
  const r = await fetch(`https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${path}?t=${Date.now()}`, { cache: 'no-store' });
  if (!r.ok) return null;
  try { return await r.json(); } catch(e) { return null; }
}

async function ghPut(path, content, sha) {
  const r = await fetch(API_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, content, sha })
  });
  if (!r.ok) { toast('❌ Chyba uložení', 'error'); return false; }
  const d = await r.json();
  if (d.content) fileSHAs[path] = d.content.sha;
  return true;
}

async function ghUploadImage(filename, base64data) {
  const safeName = filename.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `images/${Date.now()}_${safeName}`;
  const r = await fetch('/api/save', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, content: base64data, isBase64: true })
  });
  if (!r.ok) { console.error('Upload failed', r.status); return null; }
  return `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${path}`;
}

// ── DATA ──
async function loadData() {
  const files = ['cats','toms','litters','gallery','about'];
  for (const f of files) {
    const parsed = await ghGet(`data/${f}.json`);
    if (parsed !== null) {
      DATA[f] = parsed;
      if (f === 'about') document.getElementById('about-text').value = parsed.text || '';
    }
  }
  // Get SHAs separately for saves
  for (const f of files) {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/data/${f}.json`);
    if (r.ok) { const d = await r.json(); fileSHAs[`data/${f}.json`] = d.sha; }
  }
  renderAll();
}

async function saveFile(key) {
  const path = `data/${key}.json`;
  return await ghPut(path, JSON.stringify(DATA[key], null, 2), fileSHAs[path]);
}

// ── RENDER ──
function renderAll() {
  renderList('cats', DATA.cats);
  renderList('toms', DATA.toms);
  renderLitters();
  renderGalleryAdmin();
}

function renderList(type, arr) {
  const el = document.getElementById(`list-${type}`);
  if (!arr.length) { el.innerHTML = `<p style="color:var(--brown-mid);font-size:0.85rem;padding:0.5rem">Zatím žádné záznamy.</p>`; return; }
  el.innerHTML = arr.map((item, i) => `
    <div class="item-row" draggable="true" data-index="${i}"
      ondragstart="itemDragStart(event,'${type}',${i})"
      ondragover="itemDragOver(event)"
      ondragleave="itemDragLeave(event)"
      ondrop="itemDrop(event,'${type}',${i})"
      ondragend="itemDragEnd(event)">
      <span class="drag-handle" title="Přetáhněte pro změnu pořadí">☰</span>
      ${item.photo ? `<img src="${item.photo}" alt="">` : `<div style="width:52px;height:52px;background:var(--cream-dark);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem">🐱</div>`}
      <div class="item-row-info">
        <strong>${item.name || '—'}</strong>
        <span>${item.detail || ''} ${item.achievements ? '· 🏆 '+item.achievements : ''}</span>
      </div>
      <div class="item-actions">
        <button class="btn-move" onclick="moveItem('${type}',${i},-1)" ${i===0?'disabled':''} title="Posunout nahoru">↑</button>
        <button class="btn-move" onclick="moveItem('${type}',${i},1)" ${i===arr.length-1?'disabled':''} title="Posunout dolů">↓</button>
        <button class="btn btn-outline" onclick="openModal('${type}',${i})">✏️ Upravit</button>
        <button class="btn btn-danger" onclick="deleteItem('${type}',${i})">🗑</button>
      </div>
    </div>
  `).join('');
}

// ── REORDER (drag & drop + fallback buttons) ──
let dragItemType = null, dragItemIndex = null;

function itemDragStart(e, type, i) {
  dragItemType = type;
  dragItemIndex = i;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}

function itemDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function itemDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function itemDrop(e, type, i) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragItemType !== type || dragItemIndex === null || dragItemIndex === i) return;
  const arr = DATA[type];
  const moved = arr.splice(dragItemIndex, 1)[0];
  arr.splice(i, 0, moved);
  dragItemIndex = null; dragItemType = null;
  renderList(type, arr);
  const ok = await saveFile(type);
  if (ok) toast('✅ Pořadí uloženo', 'success');
}

function itemDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.item-row.drag-over').forEach(el => el.classList.remove('drag-over'));
}

async function moveItem(type, i, dir) {
  const arr = DATA[type];
  const j = i + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  renderList(type, arr);
  const ok = await saveFile(type);
  if (ok) toast('✅ Pořadí uloženo', 'success');
}

// ── TABS ──
function showTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── MODAL ──
function openModal(type, index = -1) {
  currentModal = type === 'litter' ? 'litters' : type;
  editIndex = index;
  currentModalSubgallery = [];
  const item = index >= 0 ? (
    type === 'cats' ? DATA.cats[index] :
    type === 'toms' ? DATA.toms[index] :
    type === 'litter' ? DATA.litters[index] :
    DATA.gallery[index]
  ) : {};
  if (item?.subgallery) currentModalSubgallery = [...item.subgallery];

  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');

  if (type === 'cats' || type === 'toms') {
    const isTom = type === 'toms';
    title.textContent = (index >= 0 ? 'Upravit' : 'Přidat') + (isTom ? ' kocoura' : ' kočku');
    body.innerHTML = catForm(item);
  } else if (type === 'litter') {
    title.textContent = index >= 0 ? 'Upravit vrh' : 'Přidat vrh';
    body.innerHTML = litterForm(item);
  } else if (type === 'gallery') {
    title.textContent = 'Přidat fotografii';
    body.innerHTML = galleryForm();
  }

  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function removeKittenThumb(uid, idx) {
  const row = document.querySelector(`.kitten-row[data-uid="${uid}"]`);
  let sub = JSON.parse(row.dataset.subgallery || '[]');
  sub.splice(idx, 1);
  row.dataset.subgallery = JSON.stringify(sub);
  const thumbsEl = row.querySelector(`.k-thumbs-${uid}`);
  thumbsEl.innerHTML = sub.map((url,i) => `
    <div style="position:relative;width:60px;height:60px;border-radius:4px;overflow:hidden;border:1px solid var(--border);display:inline-block;margin:2px;">
      <img src="${url}" style="width:100%;height:100%;object-fit:cover;">
      <button type="button" onclick="removeKittenThumb(${uid},${i})" style="position:absolute;top:1px;right:1px;background:rgba(139,46,46,0.9);color:white;border:none;width:16px;height:16px;border-radius:50%;cursor:pointer;font-size:9px;">✕</button>
    </div>
  `).join('');
}

async function handleKittenPhoto(input, uid) {
  if (!input.files[0]) return;
  const btn = input.nextElementSibling || input;
  const reader = new FileReader();
  reader.onload = async e => {
    const url = await ghUploadImage(input.files[0].name, e.target.result.split(',')[1]);
    if (!url) return;
    const row = document.querySelector(`.kitten-row[data-uid="${uid}"]`);
    row.querySelector('.k-photo').value = url;
    const prev = row.querySelector(`.k-photo-preview-${uid}`);
    prev.outerHTML = `<img src="${url}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border);" class="k-photo-preview-${uid}">`;
  };
  reader.readAsDataURL(input.files[0]);
}

async function handleKittenSub(input, uid) {
  if (!input.files?.length) return;
  const row = document.querySelector(`.kitten-row[data-uid="${uid}"]`);
  let sub = JSON.parse(row.dataset.subgallery || '[]');
  const thumbsEl = row.querySelector(`.k-thumbs-${uid}`);
  for (const file of Array.from(input.files)) {
    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = async e => {
        const url = await ghUploadImage(file.name, e.target.result.split(',')[1]);
        if (url) {
          sub.push(url);
          row.dataset.subgallery = JSON.stringify(sub);
          const i = sub.length - 1;
          thumbsEl.innerHTML += `
            <div style="position:relative;width:60px;height:60px;border-radius:4px;overflow:hidden;border:1px solid var(--border);display:inline-block;margin:2px;">
              <img src="${url}" style="width:100%;height:100%;object-fit:cover;">
              <button type="button" onclick="removeKittenThumb(${uid},${i})" style="position:absolute;top:1px;right:1px;background:rgba(139,46,46,0.9);color:white;border:none;width:16px;height:16px;border-radius:50%;cursor:pointer;font-size:9px;">✕</button>
            </div>`;
        }
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }
  input.value = '';
}

function addKittenRow() {
  const list = document.getElementById('k-list');
  const div = document.createElement('div');
  div.innerHTML = kRow();
  list.appendChild(div.firstElementChild);

// ── KITTEN REORDER (drag & drop + fallback buttons) ──
let draggingKittenRow = null;

function moveKittenRow(btn, dir) {
  const row = btn.closest('.kitten-row');
  if (dir < 0) {
    const prev = row.previousElementSibling;
    if (prev) row.parentNode.insertBefore(row, prev);
  } else {
    const next = row.nextElementSibling;
    if (next) row.parentNode.insertBefore(next, row);
  }
}

function kittenDragStart(e) {
  draggingKittenRow = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}

function kittenDragOver(e) {
  e.preventDefault();
  const row = e.currentTarget;
  if (!draggingKittenRow || row === draggingKittenRow) return;
  row.classList.add('drag-over');
  const list = document.getElementById('k-list');
  const rows = [...list.children];
  const draggingIdx = rows.indexOf(draggingKittenRow);
  const targetIdx = rows.indexOf(row);
  if (draggingIdx < targetIdx) row.after(draggingKittenRow);
  else row.before(draggingKittenRow);
}

function kittenDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function kittenDrop(e) {
  e.preventDefault();
}

function kittenDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kitten-row.drag-over').forEach(el => el.classList.remove('drag-over'));
  draggingKittenRow = null;
}

// ── PHOTO UPLOAD ──
function previewMainPhoto(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('p-main');
    img.src = e.target.result;
    img.style.display = 'block';
    img.dataset.file = input.files[0].name;
    img.dataset.b64 = e.target.result.split(',')[1];
  };
  reader.readAsDataURL(input.files[0]);
}

async function handleSubUpload(input) {
  if (!input.files?.length) return;
  const files = Array.from(input.files);
  const progress = document.getElementById('sub-progress');
  const progressText = document.getElementById('sub-progress-text');
  const progressFill = document.getElementById('sub-progress-fill');
  const saveBtn = document.getElementById('modal-save-btn');

  progress.style.display = 'block';
  saveBtn.disabled = true;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    progressText.textContent = `Nahrávám ${i+1} z ${files.length}: ${file.name}`;
    progressFill.style.width = `${((i) / files.length) * 100}%`;

    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = async e => {
        const url = await ghUploadImage(file.name, e.target.result.split(',')[1]);
        if (url) {
          currentModalSubgallery.push(url);
          document.getElementById('sub-grid').innerHTML = renderThumbs();
        }
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }

  progressFill.style.width = '100%';
  progressText.textContent = `✅ Nahráno ${files.length} fotek`;
  setTimeout(() => { progress.style.display = 'none'; }, 2000);
  saveBtn.disabled = false;
  input.value = '';
}

function renderThumbs() {
  return currentModalSubgallery.map((url, i) => `
    <div class="subgallery-thumb" draggable="true" ondragstart="dragStart(${i})" ondragover="dragOver(event,${i})" ondrop="dragDrop(event,${i})">
      <img src="${url}" alt="">
      <button class="thumb-del" onclick="removeThumb(${i})">✕</button>
      <span class="thumb-num">${i+1}</span>
    </div>
  `).join('');
}

function removeThumb(i) {
  currentModalSubgallery.splice(i, 1);
  document.getElementById('sub-grid').innerHTML = renderThumbs();
}

// Drag & drop řazení
let dragIdx = null;
function dragStart(i) { dragIdx = i; }
function dragOver(e, i) { e.preventDefault(); }
function dragDrop(e, i) {
  e.preventDefault();
  if (dragIdx === null || dragIdx === i) return;
  const moved = currentModalSubgallery.splice(dragIdx, 1)[0];
  currentModalSubgallery.splice(i, 0, moved);
  dragIdx = null;
  document.getElementById('sub-grid').innerHTML = renderThumbs();
}

// ── SAVE ──
async function saveModal() {
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Ukládám...';

  try {
    if (currentModal === 'cats' || currentModal === 'toms') {
      const pMain = document.getElementById('p-main');
      let mainUrl = pMain?.src?.startsWith('http') ? pMain.src : (editIndex >= 0 ? DATA[currentModal][editIndex]?.photo || '' : '');
      if (pMain?.dataset?.b64) {
        const uploaded = await ghUploadImage(pMain.dataset.file, pMain.dataset.b64);
        if (uploaded) mainUrl = uploaded;
      }

      const item = {
        name: val('f-name'), detail: val('f-detail'),
        achievements: val('f-achievements'),
        tags: val('f-tags').split(',').map(t=>t.trim()).filter(Boolean),
        ems: val('f-ems'), tests: val('f-tests'),
        color_desc: val('f-color-desc'), description: val('f-description'),
        pedigree: val('f-pedigree'), photo: mainUrl,
        subgallery: [...currentModalSubgallery]
      };
      const arr = DATA[currentModal];
      if (editIndex >= 0) arr[editIndex] = item; else arr.push(item);
      const ok = await saveFile(currentModal);
      if (ok) { toast('✅ Uloženo!', 'success'); closeModal(); renderList(currentModal, arr); }

    } else if (currentModal === 'litters') {
      const kittens = [...document.querySelectorAll('#k-list .kitten-row')].map(r => ({
        name: r.querySelector('.k-name').value,
        color: r.querySelector('.k-color').value,
        sex: r.querySelector('.k-sex').value,
        status: r.querySelector('.k-status').value,
        pedigree: r.querySelector('.k-pedigree').value,
        photo: r.querySelector('.k-photo')?.value || '',
        subgallery: JSON.parse(r.dataset.subgallery || '[]')
      }));
      const item = {
        id: val('f-id'), name: val('f-name'), born: val('f-born'),
        mother: val('f-mother'), father: val('f-father'),
        description: val('f-desc'), kittens
      };
      if (editIndex >= 0) DATA.litters[editIndex] = item; else DATA.litters.push(item);
      const ok = await saveFile('litters');
      if (ok) { toast('✅ Vrh uložen!', 'success'); closeModal(); renderLitters(); }

    } else if (currentModal === 'gallery') {
      const pMain = document.getElementById('p-main');
      if (!pMain?.dataset?.b64) { toast('❌ Vyberte fotografii', 'error'); btn.disabled = false; btn.textContent = '💾 Uložit'; return; }
      const url = await ghUploadImage(pMain.dataset.file, pMain.dataset.b64);
      if (!url) { toast('❌ Nahrání selhalo', 'error'); btn.disabled = false; btn.textContent = '💾 Uložit'; return; }
     DATA.gallery.push({ url, label: val('f-label'), category: val('f-category') || 'other' });
      const ok = await saveFile('gallery');
      if (ok) { toast('✅ Fotografie přidána!', 'success'); closeModal(); renderGalleryAdmin(); }
    }
  } catch(e) {
    console.error(e);
    toast('❌ Chyba: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '💾 Uložit';
}

async function deleteItem(type, i) {
  if (!confirm('Opravdu smazat?')) return;
  const key = type === 'litter' ? 'litters' : type;
  DATA[key].splice(i, 1);
  const ok = await saveFile(key);
  if (ok) {
    toast('🗑 Smazáno', 'info');
    if (key === 'cats' || key === 'toms') renderList(key, DATA[key]);
    else if (key === 'litters') renderLitters();
    else renderGalleryAdmin();
  }
}

async function saveAbout() {
  const btn = document.getElementById('about-save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Ukládám...';
  DATA.about.text = document.getElementById('about-text').value;
  const ok = await saveFile('about');
  if (ok) toast('✅ Text uložen!', 'success');
  btn.disabled = false; btn.innerHTML = '💾 Uložit text';
}

// ── HELPERS ──
function val(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = `toast ${type}`;
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

init();
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
