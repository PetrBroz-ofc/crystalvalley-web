<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Crystal Valley</title>
<style>
  :root {
    --cream: #f5f0e8; --brown: #3b2a1a; --brown-mid: #6b4c2a; --gold: #c9a84c;
    --green: #2d6a4f; --red: #8b2e2e; --white: #fefcf8; --border: rgba(201,168,76,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }

  #login-screen, #setup-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box, .setup-box { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 400px; box-shadow: 0 8px 32px rgba(59,42,26,0.1); }
  input[type=text], input[type=password], input[type=url], textarea, select { width: 100%; padding: 0.65rem 0.8rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.88rem; background: var(--cream); color: var(--brown); margin-bottom: 1rem; }
  label { display: block; font-size: 0.78rem; color: var(--brown-mid); margin-bottom: 0.25rem; font-weight: 500; }
  
  header { background: var(--brown); color: var(--cream); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .tabs { display: flex; background: var(--white); padding: 0 2rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 1rem 1.5rem; font-size: 0.85rem; cursor: pointer; background: none; border: none; color: var(--brown-mid); }
  .tab.active { border-bottom: 2px solid var(--gold); color: var(--brown); font-weight: 500; }
  
  .panel { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
  .panel.active { display: block; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  
  .btn { padding: 0.55rem 1.2rem; border-radius: 5px; font-size: 0.82rem; cursor: pointer; border: none; font-weight: 500; }
  .btn-primary { background: var(--brown); color: var(--cream); }
  .btn-danger { background: var(--red); color: white; }
  .btn-success { background: var(--green); color: white; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--brown-mid); }
  
  .item-row { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; background: var(--cream); border-radius: 6px; border: 1px solid var(--border); margin-bottom: 0.5rem; }
  .item-row img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; }
  
  .photo-upload-area { border: 2px dashed var(--border); border-radius: 6px; padding: 1.5rem; text-align: center; cursor: pointer; color: var(--brown-mid); font-size: 0.82rem; margin-bottom: 1rem; }
  .subgallery-manager { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
  .subgallery-thumb { position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .subgallery-thumb img { width:100%; height:100%; object-fit: cover; }
  .subgallery-thumb button { position: absolute; top:2px; right:2px; background: var(--red); color: white; border: none; width: 16px; height:16px; border-radius: 50%; cursor: pointer; font-size: 10px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 10px; padding: 2rem; width: 600px; max-height: 85vh; overflow-y: auto; }
  .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
  .toast { position: fixed; top: 1rem; right: 1rem; background: var(--green); color: #fff; padding: 0.75rem 1.25rem; border-radius: 6px; display: none; z-index: 100; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-box">
    <h3 style="margin-bottom:1rem">⚙️ Nastavení repozitáře</h3>
    <label>GitHub Personal Access Token</label><input type="text" id="setup-token">
    <label>GitHub Uživatelské jméno</label><input type="text" id="setup-owner">
    <label>Název repozitáře</label><input type="text" id="setup-repo">
    <label>Admin heslo sem do správy</label><input type="text" id="setup-password">
    <button class="btn btn-primary" style="width:100%" onclick="saveSetup()">Uložit</button>
  </div>
</div>

<div id="login-screen" style="display:none">
  <div class="login-box">
    <h3 style="margin-bottom:1rem">Přihlášení do správy</h3>
    <input type="password" id="login-pass" placeholder="Zadejte heslo">
    <button class="btn btn-primary" style="width:100%" onclick="login()">Přihlásit se</button>
  </div>
</div>

<div id="admin-screen" style="display:none">
  <header>
    <h2>Crystal Valley Admin (Pouze v češtině)</h2>
    <button class="btn btn-outline" style="color:white;border-color:white" onclick="logout()">Odhlásit</button>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('cats')">Kočky</button>
    <button class="tab" onclick="showTab('toms')">Kocouři</button>
    <button class="tab" onclick="showTab('litters')">Koťata</button>
    <button class="tab" onclick="showTab('gallery')">Galerie</button>
    <button class="tab" onclick="showTab('about')">O nás</button>
  </div>

  <div class="panel active" id="panel-cats">
    <div class="card"><div class="card-header"><h3>Chovné kočky</h3><button class="btn btn-primary" onclick="openModal('cats')">+ Přidat kočku</button></div><div id="list-cats"></div></div>
  </div>
  <div class="panel" id="panel-toms">
    <div class="card"><div class="card-header"><h3>Chovní kocouři</h3><button class="btn btn-primary" onclick="openModal('toms')">+ Přidat kocoura</button></div><div id="list-toms"></div></div>
  </div>
  <div class="panel" id="panel-litters">
    <div class="card"><div class="card-header"><h3>Vrhy</h3><button class="btn btn-primary" onclick="openModal('litter')">+ Přidat vrh</button></div><div id="list-litters"></div></div>
  </div>
  <div class="panel" id="panel-gallery">
    <div class="card"><div class="card-header"><h3>Hlavní Galerie</h3><button class="btn btn-primary" onclick="openModal('gallery')">+ Přidat fotku</button></div><div id="gallery-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:1rem"></div></div>
  </div>
  <div class="panel" id="panel-about">
    <div class="card"><h3>Text sekce O nás</h3><textarea id="about-text" rows="8" style="margin-top:1rem"></textarea><button class="btn btn-success" onclick="saveAbout()">Uložit text</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal"><h3 id="modal-title">Formulář</h3><div id="modal-body"></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Zrušit</button><button class="btn btn-success" id="modal-save-btn" onclick="saveModal()">Uložit do databáze</button></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASS_KEY = 'cv_admin_pass'; const TOKEN_KEY = 'cv_gh_token'; const OWNER_KEY = 'cv_gh_owner'; const REPO_KEY = 'cv_gh_repo';
let GH_TOKEN, GH_OWNER, GH_REPO;
let DATA = { cats: [], toms: [], litters: [], gallery: [], about: {} };
let fileSHAs = {}; let currentModal = null; let editIndex = -1; let currentModalSubgallery = [];

function init() {
  if (!localStorage.getItem(TOKEN_KEY) || !localStorage.getItem(PASS_KEY)) { show('setup-screen'); return; }
  GH_TOKEN = localStorage.getItem(TOKEN_KEY); GH_OWNER = localStorage.getItem(OWNER_KEY); GH_REPO = localStorage.getItem(REPO_KEY);
  show('login-screen');
}
function saveSetup() {
  localStorage.setItem(TOKEN_KEY, document.getElementById('setup-token').value.trim());
  localStorage.setItem(OWNER_KEY, document.getElementById('setup-owner').value.trim());
  localStorage.setItem(REPO_KEY, document.getElementById('setup-repo').value.trim());
  localStorage.setItem(PASS_KEY, document.getElementById('setup-password').value.trim());
  init();
}
function login() {
  if (document.getElementById('login-pass').value === localStorage.getItem(PASS_KEY)) { show('admin-screen'); loadData(); } else { alert('Špatné heslo'); }
}
function logout() { show('login-screen'); }
function show(id) { ['setup-screen','login-screen','admin-screen'].forEach(s=>document.getElementById(s).style.display=s===id?(id==='admin-screen'?'block':'flex'):'none'); }

async function ghGet(path) {
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { headers: { Authorization: `token ${GH_TOKEN}` } });
  return r.ok ? r.json() : null;
}
async function ghPut(path, content, sha) {
  const body = { message: `Update ${path}`, content: btoa(unescape(encodeURIComponent(content))) }; if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { method: 'PUT', headers: { Authorization: `token ${GH_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const d = await r.json(); if (d.content) fileSHAs[path] = d.content.sha; return r.ok;
}
async function ghUploadImage(filename, base64data) {
  const path = `images/${filename}`; const existing = await ghGet(path);
  const body = { message: `Upload ${filename}`, content: base64data }; if (existing) body.sha = existing.sha;
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { method: 'PUT', headers: { Authorization: `token ${GH_TOKEN}` }, body: JSON.stringify(body) });
  return r.ok ? `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${path}` : null;
}

async function loadData() {
  const files = ['data/cats.json','data/toms.json','data/litters.json','data/gallery.json','data/about.json'];
  for (const f of files) {
    const res = await ghGet(f);
    if (res && res.content) {
      fileSHAs[f] = res.sha; const parsed = JSON.parse(atob(res.content.replace(/\n/g,'')));
      if (f.includes('cats')) DATA.cats = parsed; if (f.includes('toms')) DATA.toms = parsed;
      if (f.includes('litters')) DATA.litters = parsed; if (f.includes('gallery')) DATA.gallery = parsed;
      if (f.includes('about')) { DATA.about = parsed; document.getElementById('about-text').value = parsed.text || ''; }
    }
  }
  renderAll();
}

function renderAll() {
  renderList('cats', DATA.cats); renderList('toms', DATA.toms);
  document.getElementById('list-litters').innerHTML = DATA.litters.map((l,i)=>`<div class="item-row"><div style="flex:1"><strong>Vrh ${l.id} — ${l.name}</strong></div><button class="btn btn-outline" onclick="openModal('litter',${i})">Upravit</button><button class="btn btn-danger" onclick="deleteItem('litters',${i})">Smazat</button></div>`).join('') || 'Žádné vrhy.';
  document.getElementById('gallery-grid').innerHTML = DATA.gallery.map((g,i)=>`<div style="position:relative"><img src="${g.url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px"><button onclick="deleteItem('gallery',${i})" style="position:absolute;top:2px;right:2px;background:var(--red);color:white;border:none;padding:2px 5px;cursor:pointer;font-size:10px">✕</button></div>`).join('');
}
function renderList(type, arr) {
  document.getElementById(`list-${type}`).innerHTML = arr.map((item, i) => `<div class="item-row">${item.photo?`<img src="${item.photo}">`:''} <div style="flex:1"><strong>${item.name}</strong><span>${item.detail||''}</span></div><button class="btn btn-outline" onclick="openModal('${type}',${i})">Upravit</button><button class="btn btn-danger" onclick="deleteItem('${type}',${i})">Smazat</button></div>`).join('') || 'Žádné záznamy.';
}

function showTab(name) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('panel-'+name).classList.add('active'); event.target.classList.add('active'); }

function openModal(type, index = -1) {
  currentModal = type; editIndex = index; const body = document.getElementById('modal-body');
  const item = index >= 0 ? (type==='cats'?DATA.cats[index]:type==='toms'?DATA.toms[index]:type==='litter'?DATA.litters[index]:DATA.gallery[index]) : {};
  
  if (type === 'cats' || type === 'toms') {
    currentModalSubgallery = item.subgallery ? [...item.subgallery] : [];
    body.innerHTML = `
      <label>Jméno</label><input type="text" id="f-name" value="${item.name||''}">
      <label>Třída / Podtitul</label><input type="text" id="f-detail" value="${item.detail||''}">
      <label>EMS kód</label><input type="text" id="f-ems" value="${item.ems||''}">
      <label>Zdravotní testy</label><input type="text" id="f-tests" value="${item.tests||''}">
      <label>Popis barvy</label><input type="text" id="f-color-desc" value="${item.color_desc||''}">
      <label>Životopis / Popis</label><textarea id="f-description" rows="4">${item.description||''}</textarea>
      <label>URL rodokmenu</label><input type="url" id="f-pedigree" value="${item.pedigree||''}">
      <label>Hlavní foto</label><div class="photo-upload-area" onclick="document.getElementById('img-i').click()">Klikni pro nahrání foto<input type="file" id="img-i" onchange="previewMain(this)"><img id="p-main" src="${item.photo||''}" style="width:60px;margin-top:5px;display:${item.photo?'block':'none'}"></div>
      <label>Podgalerie kočky</label><div class="photo-upload-area" style="border-color:var(--gold)" onclick="document.getElementById('sub-i').click()">Přidat další fotku<input type="file" id="sub-i" onchange="uploadSub(this)"></div><div class="subgallery-manager" id="sub-w">${renderThumbs()}</div>
    `;
  } else if (type === 'litter') {
    currentModal = 'litters';
    body.innerHTML = `
      <label>ID vrhu (A, B...)</label><input type="text" id="f-id" value="${item.id||''}">
      <label>Název vrhu</label><input type="text" id="f-name" value="${item.name||''}">
      <label>Datum narození</label><input type="text" id="f-born" value="${item.born||''}">
      <label>Matka</label><input type="text" id="f-mother" value="${item.mother||''}">
      <label>Otec</label><input type="text" id="f-father" value="${item.father||''}">
      <label>Popis vrhu</label><textarea id="f-desc">${item.description||''}</textarea>
      <div style="display:flex;justify-content:between;margin-bottom:5px"><strong>Koťata v vrhu</strong> <button class="btn btn-outline" style="margin-left:auto" onclick="addKittenRow()">+ Přidat</button></div>
      <div id="k-list">${(item.kittens||[]).map((k,i)=>kRow(k,i)).join('')}</div>
    `;
  } else if (type === 'gallery') {
    body.innerHTML = `<label>Popisek fotky</label><input type="text" id="f-label" value="${item.label||''}"> <div class="photo-upload-area" onclick="document.getElementById('g-i').click()">Nahrát fotku<input type="file" id="g-i" onchange="previewMain(this)"><img id="p-main" style="width:60px;display:none"></div>`;
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function renderThumbs() { return currentModalSubgallery.map((url,i)=>`<div class="subgallery-thumb"><img src="${url}"><button onclick="currentModalSubgallery.splice(${i},1);document.getElementById('sub-w').innerHTML=renderThumbs()">✕</button></div>`).join(''); }
async function uploadSub(input) {
  if(!input.files[0]) return; toast('Nahrávám...');
  const reader = new FileReader(); reader.onload = async e => {
    const url = await ghUploadImage(Date.now()+'_sub_'+input.files[0].name, e.target.result.split(',')[1]);
    if(url) { currentModalSubgallery.push(url); document.getElementById('sub-w').innerHTML = renderThumbs(); toast('Přidáno'); }
  }; reader.readAsDataURL(input.files[0]);
}
function previewMain(input) {
  if(!input.files[0]) return; const reader = new FileReader(); reader.onload = e => {
    const img = document.getElementById('p-main'); img.src = e.target.result; img.style.display = 'block';
    img.dataset.file = input.files[0].name; img.dataset.b64 = e.target.result.split(',')[1];
  }; reader.readAsDataURL(input.files[0]);
}

function kRow(k={}, i=0) {
  return `<div class="item-row" style="background:#fff"><input type="text" placeholder="Jméno" value="${k.name||''}" class="k-name" style="margin:0;width:30%"> <input type="text" placeholder="Barva" value="${k.color||''}" class="k-color" style="margin:0;width:30%"> <select class="k-sex" style="margin:0;width:20%"><option value="Kocour" ${k.sex==='Kocour'?'selected':''}>Kocour</option><option value="Kočka" ${k.sex==='Kočka'?'selected':''}>Kočka</option></select> <select class="k-status" style="margin:0;width:20%"><option value="available" ${k.status==='available'?'selected':''}>Volné</option><option value="reserved" ${k.status==='reserved'?'selected':''}>Rezervace</option><option value="sold" ${k.status==='sold'?'selected':''}>V domově</option></select></div>`;
}
function addKittenRow() { const div = document.createElement('div'); div.innerHTML = kRow({}, Date.now()); document.getElementById('k-list').appendChild(div.firstElementChild); }

async function saveModal() {
  const btn = document.getElementById('modal-save-btn'); btn.disabled = true;
  const pMain = document.getElementById('p-main'); let mainUrl = pMain ? pMain.src : '';
  if (pMain && pMain.dataset.b64) mainUrl = await ghUploadImage(Date.now()+'_'+pMain.dataset.file, pMain.dataset.b64);

  if (currentModal==='cats' || currentModal==='toms') {
    const item = { name: document.getElementById('f-name').value, detail: document.getElementById('f-detail').value, ems: document.getElementById('f-ems').value, tests: document.getElementById('f-tests').value, color_desc: document.getElementById('f-color-desc').value, description: document.getElementById('f-description').value, pedigree: document.getElementById('f-pedigree').value, photo: mainUrl, subgallery: currentModalSubgallery, tags: [] };
    const arr = currentModal==='cats'?DATA.cats:DATA.toms; if(editIndex>=0) arr[editIndex]=item; else arr.push(item);
    await ghPut(`data/${currentModal}.json`, JSON.stringify(arr,null,2), fileSHAs[`data/${currentModal}.json`]);
  } else if (currentModal==='litters') {
    const kittens = [...document.querySelectorAll('#k-list .item-row')].map(r=>({ name: r.querySelector('.k-name').value, color: r.querySelector('.k-color').value, sex: r.querySelector('.k-sex').value, status: r.querySelector('.k-status').value }));
    const item = { id: document.getElementById('f-id').value, name: document.getElementById('f-name').value, born: document.getElementById('f-born').value, mother: document.getElementById('f-mother').value, father: document.getElementById('f-father').value, description: document.getElementById('f-desc').value, kittens };
    if(editIndex>=0) DATA.litters[editIndex]=item; else DATA.litters.push(item);
    await ghPut('data/litters.json', JSON.js(DATA.litters,null,2), fileSHAs['data/litters.json']);
  } else if (currentModal==='gallery') {
    if(!mainUrl) return; const item = { url: mainUrl, label: document.getElementById('f-label').value };
    if(editIndex>=0) DATA.gallery[editIndex]=item; else DATA.gallery.push(item);
    await ghPut('data/gallery.json', JSON.stringify(DATA.gallery,null,2), fileSHAs['data/gallery.json']);
  }
  closeModal(); loadData(); btn.disabled = false;
}

async function deleteItem(type, i) {
  if(!confirm('Smazat?')) return;
  const key = type==='cats'?'cats':type==='toms'?'toms':type==='litters'?'litters':'gallery';
  DATA[key].splice(i,1); await ghPut(`data/${key}.json`, JSON.stringify(DATA[key],null,2), fileSHAs[`data/${key}.json`]); loadData();
}
async function saveAbout() {
  DATA.about.text = document.getElementById('about-text').value;
  await ghPut('data/about.json', JSON.stringify(DATA.about,null,2), fileSHAs['data/about.json']); toast('Uloženo');
}
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
init();
</script>
</body>
</html>
